<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companion UI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>∞</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a; color: #e0e0e0;
      height: 100vh; display: flex; overflow: hidden;
    }

    /* Canvas — right 70% */
    .canvas {
      flex: 7; display: flex; align-items: center; justify-content: center;
      background: #0a0a0a; position: relative; overflow: hidden;
    }
    .presence {
      font-size: 64px; opacity: 0.3; color: #e8856a;
      animation: pulse 4s ease-in-out infinite;
      transition: opacity 0.6s;
    }
    .presence.hidden { opacity: 0; pointer-events: none; }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(1.06); }
    }
    .canvas-content {
      position: absolute; inset: 0;
      padding: 48px; display: flex; flex-direction: column;
      gap: 20px; overflow-y: auto; align-items: center;
      justify-content: flex-start; /* 修复滚不到顶 */
      min-height: 100%; /* 内容少时居中 */
    }
    .canvas-content:empty::before {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Canvas components */
    .canvas-card {
      background: rgba(18, 18, 18, 0.85);
      border: 1px solid rgba(232, 133, 106, 0.15);
      border-radius: 16px; padding: 28px 32px;
      backdrop-filter: blur(12px);
      animation: fadeSlideIn 0.6s cubic-bezier(.23,1,.32,1);
      max-width: 560px; width: 100%;
      word-wrap: break-word; /* 防止长单词溢出 */
      overflow-wrap: break-word;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .canvas-card.fade-out {
      animation: fadeOut 0.4s ease-out forwards;
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateY(-12px) scale(0.97); }
    }

    .movie-card h2 { color: #e8856a; margin-bottom: 6px; font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
    .movie-card .meta-row { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
    .movie-card .year { color: #777; font-size: 14px; }
    .movie-card .rating { color: #e0a86e; font-size: 14px; }
    .movie-card .genre { color: #666; font-size: 13px; background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 4px; }
    .movie-card .tagline { color: #bbb; font-size: 15px; line-height: 1.6; }
    .movie-card .director { color: #666; font-size: 13px; margin-top: 12px; }

    .progress-card h3 { color: #e8856a; margin-bottom: 16px; font-size: 16px; }
    .progress-bar { background: #1a1a1a; height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { background: linear-gradient(90deg, #e8856a, #e0a86e); height: 100%; border-radius: 3px; transition: width 1s cubic-bezier(.23,1,.32,1); }
    .progress-meta { color: #777; font-size: 13px; }

    .text-highlight { font-size: 24px; color: #e8856a; text-align: center; line-height: 1.5; font-weight: 300; letter-spacing: -0.3px; }

    .code-block pre { background: #111; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 13px; line-height: 1.5; color: #ccc; }

    .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .image-grid img { width: 100%; border-radius: 8px; object-fit: cover; aspect-ratio: 16/10; background: #1a1a1a; }

    .list-card h3 { color: #e8856a; margin-bottom: 16px; font-size: 16px; }
    .list-card .list-item { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; justify-content: space-between; align-items: center; gap: 16px; }
    .list-card .list-item:last-child { border-bottom: none; }
    .list-card .item-title { color: #ddd; font-size: 14px; flex: 1; }
    .list-card .item-detail { color: #777; font-size: 13px; text-align: right; flex-shrink: 0; }

    /* Chat panel — left 30% */
    .chat-panel {
      flex: 3; display: flex; flex-direction: column;
      background: #0d0d0d; border-right: 1px solid #151515;
      min-width: 280px; max-width: 420px;
    }
    .chat-header {
      padding: 14px 20px; border-bottom: 1px solid #151515;
      display: flex; justify-content: space-between; align-items: center;
    }
    .chat-header h1 { font-size: 15px; font-weight: 500; color: #e8856a; }
    .gear-icon {
      cursor: pointer; font-size: 16px; opacity: 0.4;
      transition: opacity 0.2s; user-select: none;
    }
    .gear-icon:hover { opacity: 0.8; }

    .config-panel {
      max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
      border-bottom: 1px solid #151515; background: #0a0a0a;
    }
    .config-panel.open { max-height: 320px; overflow-y: auto; }
    .config-content { padding: 14px 20px; }
    .field { margin-bottom: 10px; }
    .field label { font-size: 11px; color: #555; display: block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.3px; }
    input, select {
      background: #141414; border: 1px solid #1e1e1e; border-radius: 6px;
      color: #ccc; padding: 7px 10px; font-size: 12px; width: 100%;
      outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #e8856a44; }
    .save-hint { font-size: 11px; color: #444; margin-top: 8px; }

    .messages {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    .message { display: flex; flex-direction: column; animation: msgIn 0.3s ease; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } }
    .message.user { align-items: flex-end; }
    .message.agent { align-items: flex-start; }
    .message-content {
      max-width: 88%; font-size: 14px; line-height: 1.55;
      word-wrap: break-word; overflow-wrap: break-word; /* 防止溢出 */
    }
    .message.user .message-content {
      background: rgba(232, 133, 106, 0.1);
      color: #ddd; padding: 8px 14px; border-radius: 12px 12px 4px 12px;
    }
    .message.agent .message-content {
      color: #aaa; padding: 4px 0;
    }
    .message.agent .message-content p { margin-bottom: 8px; word-wrap: break-word; }
    .message.agent .message-content p:last-child { margin-bottom: 0; }
    .message.agent .message-content strong { color: #ddd; }
    .message.agent .message-content code { 
      background: #1a1a1a; padding: 1px 5px; border-radius: 3px; font-size: 13px;
      word-break: break-all; /* 代码块也要防溢出 */
    }
    .message.agent .message-content pre {
      background: #111; padding: 12px; border-radius: 6px;
      overflow-x: auto; font-size: 12px; max-width: 100%;
    }

    .typing { color: #555; font-size: 13px; padding: 4px 0; }
    .typing::after {
      content: ''; display: inline-block;
      width: 4px; height: 4px; background: #e8856a;
      border-radius: 50%; margin-left: 6px;
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }

    .input-area {
      padding: 14px 20px; border-top: 1px solid #151515;
      display: flex; gap: 8px;
    }
    .input-area input {
      flex: 1; padding: 9px 12px; border-radius: 8px; font-size: 13px;
    }
    .input-area button {
      padding: 9px 18px; border: none; border-radius: 8px;
      background: #e8856a; color: #0a0a0a; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: opacity 0.2s;
    }
    .input-area button:hover { opacity: 0.85; }
    .input-area button:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Responsive */
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .canvas { flex: 1; min-height: 40vh; }
      .chat-panel { max-width: 100%; min-width: 100%; flex: none; height: 60vh; }
    }
  </style>
</head>
<body>
  <div class="chat-panel">
    <div class="chat-header">
      <h1>Companion</h1>
      <div class="gear-icon" id="gearBtn">⚙</div>
    </div>

    <div class="config-panel" id="configPanel">
      <div class="config-content">
        <div class="field">
          <label>Base URL</label>
          <input id="baseUrl" placeholder="https://api.anthropic.com">
        </div>
        <div class="field">
          <label>API Key</label>
          <input type="password" id="apiKey" placeholder="sk-ant-...">
        </div>
        <div class="field">
          <label>Model</label>
          <input id="model" placeholder="claude-sonnet-4-20250514">
        </div>
        <div class="save-hint">Auto-saved to localStorage</div>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <input type="text" id="input" placeholder="Say something..." autocomplete="off" />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <div class="canvas" id="canvas">
    <div class="presence" id="presence">∞</div>
  </div>

  <script>
    // --- Config ---
    const STORAGE_KEY = 'companion-ui-config'
    const HISTORY_KEY = 'companion-ui-history'

    const SYSTEM_PROMPT = `You are a visual AI companion. Your responses come alive on a canvas beside the chat.

When your response benefits from visual representation, include canvas annotations:

Format: <!--canvas:TYPE JSON-->

Types:
- movie-card: {"title":"Name","year":2020,"rating":8.5,"tagline":"Description","genre":"Sci-Fi","director":"Name"}
- progress-card: {"title":"Task","progress":75,"status":"In progress"}
- text-highlight: {"text":"Important quote or insight"}
- code-block: {"code":"console.log('hi')","language":"javascript"}
- list-card: {"title":"List Title","items":[{"title":"Item 1","detail":"detail"},{"title":"Item 2","detail":"detail"}]}

Rules:
- Only use canvas when visuals add value. Pure text answers need no annotation.
- Keep chat text brief when canvas carries the detail.
- You can include multiple annotations for rich responses.
- Canvas annotations are hidden from the user's chat view — they only appear on the visual canvas.

Example:
"Here's a great sci-fi film you might enjoy:
<!--canvas:movie-card {"title":"The Endless","year":2017,"rating":7.0,"tagline":"Two brothers return to a UFO death cult they escaped as teens, only to discover something truly otherworldly.","genre":"Sci-Fi / Horror","director":"Justin Benson & Aaron Moorhead"}-->
It's by the same duo who made Resolution — low budget but deeply inventive."`

    let conversationHistory = []

    function loadConfig() {
      try {
        const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}')
        if (s.baseUrl) document.getElementById('baseUrl').value = s.baseUrl
        if (s.apiKey) document.getElementById('apiKey').value = s.apiKey
        if (s.model) document.getElementById('model').value = s.model
      } catch {}
    }

    function saveConfig() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        baseUrl: document.getElementById('baseUrl').value,
        apiKey: document.getElementById('apiKey').value,
        model: document.getElementById('model').value,
      }))
    }

    function getConfig() {
      return {
        baseUrl: document.getElementById('baseUrl').value.trim() || 'https://api.anthropic.com',
        apiKey: document.getElementById('apiKey').value.trim(),
        model: document.getElementById('model').value.trim() || 'claude-sonnet-4-20250514',
      }
    }

    loadConfig()
    document.querySelectorAll('#baseUrl,#apiKey,#model').forEach(el => {
      el.addEventListener('input', saveConfig)
    })

    // --- UI ---
    document.getElementById('gearBtn').addEventListener('click', () => {
      document.getElementById('configPanel').classList.toggle('open')
    })

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { 
        e.preventDefault(); 
        send(); 
      }
    })
    document.getElementById('sendBtn').addEventListener('click', send)

    // --- Chat ---
    function addMessage(role, html) {
      const area = document.getElementById('messages')
      const div = document.createElement('div')
      div.className = `message ${role}`
      div.innerHTML = `<div class="message-content">${html}</div>`
      area.appendChild(div)
      area.scrollTop = area.scrollHeight
      return div
    }

    function addTypingIndicator() {
      const area = document.getElementById('messages')
      const div = document.createElement('div')
      div.className = 'message agent'
      div.id = 'typing'
      div.innerHTML = '<div class="typing">thinking</div>'
      area.appendChild(div)
      area.scrollTop = area.scrollHeight
      return div
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typing')
      if (el) el.remove()
    }

    function stripCanvasAnnotations(text) {
      // Remove complete annotations
      let result = text.replace(/<!--canvas:\S+\s+[\s\S]*?-->/g, '')
      // Also remove incomplete annotations (streaming: <!-- arrived but --> hasn't yet)
      const incompleteIdx = result.indexOf('<!--canvas:')
      if (incompleteIdx !== -1) {
        result = result.substring(0, incompleteIdx)
      }
      return result.trim()
    }

    function parseCanvasAnnotations(text) {
      const results = []
      const regex = /<!--canvas:(\S+)\s+([\s\S]*?)-->/g
      let m
      while ((m = regex.exec(text)) !== null) {
        try {
          results.push({ type: m[1], data: JSON.parse(m[2]) })
        } catch (e) {
          console.warn('Canvas parse error:', e, m[2])
        }
      }
      return results
    }

    // --- Canvas Rendering ---
    function renderCanvas(components) {
      const canvas = document.getElementById('canvas')
      const presence = document.getElementById('presence')

      // Fade out old content
      const oldContent = canvas.querySelector('.canvas-content')
      if (oldContent) {
        oldContent.querySelectorAll('.canvas-card').forEach(c => c.classList.add('fade-out'))
        setTimeout(() => oldContent.remove(), 400)
      }

      if (components.length === 0) {
        presence.classList.remove('hidden')
        return
      }

      presence.classList.add('hidden')

      const container = document.createElement('div')
      container.className = 'canvas-content'

      components.forEach(({ type, data }, i) => {
        const card = document.createElement('div')
        card.className = `canvas-card ${type}`
        card.style.animationDelay = `${i * 0.1}s`

        switch (type) {
          case 'movie-card':
            card.innerHTML = `
              <h2>${esc(data.title)}</h2>
              <div class="meta-row">
                <span class="year">${data.year || ''}</span>
                ${data.rating ? `<span class="rating">★ ${data.rating}</span>` : ''}
                ${data.genre ? `<span class="genre">${esc(data.genre)}</span>` : ''}
              </div>
              <div class="tagline">${esc(data.tagline || '')}</div>
              ${data.director ? `<div class="director">Directed by ${esc(data.director)}</div>` : ''}
            `
            break
          case 'progress-card':
            card.innerHTML = `
              <h3>${esc(data.title)}</h3>
              <div class="progress-bar"><div class="progress-fill" style="width:${data.progress || 0}%"></div></div>
              <div class="progress-meta">${esc(data.status || '')} ${data.progress ? data.progress + '%' : ''}</div>
            `
            break
          case 'text-highlight':
            card.innerHTML = `<div class="text-highlight">${esc(data.text)}</div>`
            break
          case 'code-block':
            card.innerHTML = `<div class="code-block"><pre><code>${esc(data.code || '')}</code></pre></div>`
            break
          case 'list-card':
            const items = (data.items || []).map(it =>
              `<div class="list-item"><span class="item-title">${esc(it.title)}</span><span class="item-detail">${esc(it.detail || '')}</span></div>`
            ).join('')
            card.innerHTML = `<h3>${esc(data.title)}</h3>${items}`
            break
          case 'image-grid':
            const imgs = (data.images || []).map(url =>
              `<img src="${esc(url)}" loading="lazy" />`
            ).join('')
            card.innerHTML = `<div class="image-grid">${imgs}</div>`
            break
          default:
            card.innerHTML = `<div style="color:#666">Unknown: ${esc(type)}</div>`
        }

        container.appendChild(card)
      })

      canvas.appendChild(container)
    }

    // --- API Call (pure frontend, direct to Anthropic) ---
    async function send() {
      const input = document.getElementById('input')
      const btn = document.getElementById('sendBtn')
      const prompt = input.value.trim()
      if (!prompt) return

      const config = getConfig()
      if (!config.apiKey) {
        document.getElementById('configPanel').classList.add('open')
        document.getElementById('apiKey').focus()
        return
      }

      // Add user message
      addMessage('user', esc(prompt))
      input.value = ''
      btn.disabled = true

      conversationHistory.push({ role: 'user', content: prompt })

      const typingEl = addTypingIndicator()

      try {
        // Use /api/proxy to avoid CORS issues
        const proxyUrl = '/api/proxy'

        const res = await fetch(proxyUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': config.apiKey,
            'x-base-url': config.baseUrl,
            'anthropic-version': '2023-06-01',
          },
          body: JSON.stringify({
            model: config.model,
            max_tokens: 2048,
            system: SYSTEM_PROMPT,
            messages: conversationHistory,
            stream: true,
          }),
        })

        if (!res.ok) {
          const errText = await res.text()
          throw new Error(`HTTP ${res.status}: ${errText.slice(0, 200)}`)
        }

        // Read SSE stream
        removeTypingIndicator()
        const msgEl = addMessage('agent', '')
        const contentEl = msgEl.querySelector('.message-content')
        const reader = res.body.getReader()
        const decoder = new TextDecoder()
        let buffer = ''
        let fullText = ''

        while (true) {
          const { done, value } = await reader.read()
          if (done) break
          buffer += decoder.decode(value, { stream: true })

          const lines = buffer.split('\n')
          buffer = lines.pop() || ''

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue
            const dataStr = line.slice(6)
            if (dataStr === '[DONE]') continue

            try {
              const event = JSON.parse(dataStr)
              if (event.type === 'content_block_delta' && event.delta?.type === 'text_delta') {
                fullText += event.delta.text
                const cleanText = stripCanvasAnnotations(fullText)
                contentEl.innerHTML = marked.parse(cleanText)
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight
              }
            } catch {}
          }
        }

        // Store assistant response
        conversationHistory.push({ role: 'assistant', content: fullText })

        // Final render of clean text (fixes streaming artifacts)
        const finalClean = stripCanvasAnnotations(fullText)
        if (finalClean) {
          contentEl.innerHTML = marked.parse(finalClean)
        } else {
          // No text content, remove empty message bubble
          msgEl.remove()
        }

        // Render canvas
        const components = parseCanvasAnnotations(fullText)
        if (components.length > 0) renderCanvas(components)

      } catch (err) {
        removeTypingIndicator()
        addMessage('agent', `<span style="color:#e85555">Error: ${esc(err.message)}</span>`)
      } finally {
        btn.disabled = false
        input.focus()
      }
    }

    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    }
  </script>
</body>
</html>
